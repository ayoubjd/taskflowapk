name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build APK with Capacitor
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Android Gradle) ───────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies (Capacitor CLI + packages) ────────
      - name: Install dependencies
        run: npm install

      # ── 5. Add Android platform ───────────────────────────────────────
      #    Only runs if the android/ folder doesn't already exist
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already added, skipping."
          fi

      # ── 6. Sync web assets into Android project ───────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 7. Set up Android SDK ─────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 8. Accept Android SDK licenses ───────────────────────────────
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 9. Make Gradle wrapper executable ────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ───────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Upload APK as artifact ────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Create GitHub Release on push to main ─────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TaskFlow v${{ github.run_number }}"
          body: |
            ## TaskFlow APK Build #${{ github.run_number }}

            **Automatically built** from commit `${{ github.sha }}`

            ### Install
            1. Download `app-debug.apk` below
            2. On your Android phone → Settings → Install unknown apps → Allow
            3. Open the downloaded APK and install

            > This is a debug build. For production, set up signing keys (see README).
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
