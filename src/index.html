    <script>
        // State
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [
            { id: 1, title: 'Check Emails', priority: 1, start: 8.5, end: 9, recurrence: 'weekdays', recurrenceDays: [], subtasks: [] },
            { id: 2, title: 'Project Focus', priority: 1, start: 10, end: 12, recurrence: 'none', recurrenceDays: [], subtasks: [{id:1,text:'Research phase',done:false},{id:2,text:'Write outline',done:false},{id:3,text:'First draft',done:false}] },
            { id: 3, title: 'Gym Session', priority: 2, start: 17, end: 18.5, recurrence: 'daily', recurrenceDays: [], subtasks: [] },
            { id: 4, title: 'Learning', priority: 3, start: null, end: null, recurrence: 'none', recurrenceDays: [], subtasks: [] }
        ];

        // Temp subtasks being edited in modal
        let modalSubtasks = [];
        // Active task id for subtask detail modal
        let activeSubtaskTaskId = null;

        let habits = JSON.parse(localStorage.getItem('habits')) || [
            { id: 1, title: 'Drink Water', goal: 8, color: '#3b82f6', logs: {} },
            { id: 2, title: 'Read Book', goal: 1, color: '#10b981', logs: {} }
        ];

        let currentView = 'priority';
        const START_HOUR = 6;
        const END_HOUR = 22;
        let hourWidth = 100;
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        function init() {
            // Migrate old tasks to new schema
            tasks = tasks.map(t => ({
                recurrence: 'none',
                recurrenceDays: [],
                subtasks: [],
                ...t
            }));
            applyTheme();
            renderTasks();
            renderHabits();
            switchView('priority');
            lucide.createIcons();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
            renderTasks(); 
            renderHabits();
        }

        function applyTheme() {
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function switchView(view) {
            currentView = view;
            const pView = document.getElementById('priority-view');
            const tView = document.getElementById('timeline-view');
            const hView = document.getElementById('habits-view');
            
            const pBtns = [document.getElementById('view-priority-desktop'), document.getElementById('view-priority-mobile')];
            const tBtns = [document.getElementById('view-timeline-desktop'), document.getElementById('view-timeline-mobile')];
            const hBtns = [document.getElementById('view-habits-desktop'), document.getElementById('view-habits-mobile')];

            [pView, tView, hView].forEach(v => v?.classList.add('hidden'));
            [...pBtns, ...tBtns, ...hBtns].forEach(b => b?.classList.remove('view-btn-active'));

            if (view === 'priority') {
                pView.classList.remove('hidden');
                pBtns.forEach(b => b?.classList.add('view-btn-active'));
            } else if (view === 'timeline') {
                tView.classList.remove('hidden');
                tBtns.forEach(b => b?.classList.add('view-btn-active'));
                renderTimelineTasks();
                renderTimelineGrid();
            } else if (view === 'habits') {
                hView.classList.remove('hidden');
                hBtns.forEach(b => b?.classList.add('view-btn-active'));
                renderHabits();
            }
        }

        function handleZoom(val) {
            hourWidth = parseInt(val);
            document.getElementById('zoom-slider').value = val;
            renderTimelineGrid();
            renderTimelineTasks();
        }

        function changeZoom(delta) {
            handleZoom(Math.min(Math.max(20, hourWidth + delta), 400));
        }

        function fitTimelineToScreen() {
            const container = document.querySelector('.timeline-container');
            const totalHours = END_HOUR - START_HOUR + 1;
            const availableWidth = container.clientWidth - 48;
            handleZoom(Math.floor(availableWidth / totalHours));
        }

        function renderTimelineGrid() {
            const grid = document.getElementById('hour-markers');
            const gridContainer = document.getElementById('timeline-grid');
            const totalHours = END_HOUR - START_HOUR;
            
            gridContainer.style.width = `${(totalHours + 1) * hourWidth}px`;
            grid.innerHTML = '';
            
            for (let h = START_HOUR; h <= END_HOUR; h++) {
                const label = h > 12 ? `${h-12} PM` : (h === 12 ? '12 PM' : `${h} AM`);
                let showLabel = true;
                if (hourWidth < 40) showLabel = (h % 4 === 0);
                else if (hourWidth < 70) showLabel = (h % 2 === 0);

                grid.innerHTML += `
                    <div class="relative border-l border-base h-full" style="width: ${hourWidth}px">
                        ${showLabel ? `<span class="absolute -top-6 left-0 -translate-x-1/2 text-[9px] font-black text-secondary tracking-tighter whitespace-nowrap">${label}</span>` : ''}
                    </div>
                `;
            }
        }

        function renderTasks() {
            renderPriorityLists();
            renderTimelineTasks(); // Always render to keep state in sync
            updateCounts();
            saveTasks();
        }

        function renderPriorityLists() {
            [1, 2, 3].forEach(p => {
                const list = document.getElementById(`list-p${p}`);
                if (!list) return;
                list.innerHTML = '';
                
                const filtered = tasks.filter(t => t.priority === p);
                filtered.forEach(task => {
                    const dotColor = p == 1 ? 'bg-rose-500' : p == 2 ? 'bg-amber-500' : 'bg-emerald-500';
                    const timeStr = task.start !== null ? `${formatTime(task.start)} - ${formatTime(task.end)}` : 'Unscheduled';
                    const recurLabel = getRecurrenceLabel(task);
                    const subtasks = task.subtasks || [];
                    const subtaskDone = subtasks.filter(s => s.done).length;
                    const subtaskTotal = subtasks.length;
                    const subtaskPct = subtaskTotal > 0 ? (subtaskDone / subtaskTotal) * 100 : 0;

                    const card = document.createElement('div');
                    card.className = 'priority-card group bg-card rounded-xl border border-base shadow-sm hover:border-indigo-400 transition-all cursor-grab active:cursor-grabbing';
                    card.dataset.id = task.id;
                    card.onpointerdown = (e) => startPriorityDrag(e, task.id);

                    card.innerHTML = `
                        <div class="p-3 flex items-start justify-between gap-2">
                            <div class="flex items-start gap-3 pointer-events-none flex-1 min-w-0">
                                <div class="w-2 h-2 rounded-full ${dotColor} mt-1.5 flex-shrink-0"></div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-sm text-primary leading-tight">${task.title}</h4>
                                    <div class="flex items-center gap-2 mt-1 flex-wrap">
                                        <p class="text-[10px] font-bold text-secondary uppercase">${timeStr}</p>
                                        ${recurLabel ? `<span class="recur-badge"><i data-lucide="repeat" style="width:9px;height:9px;display:inline-block;vertical-align:middle;margin-right:2px;"></i>${recurLabel}</span>` : ''}
                                        ${subtaskTotal > 0 ? `<span class="text-[10px] font-bold text-secondary">${subtaskDone}/${subtaskTotal} steps</span>` : ''}
                                    </div>
                                    ${subtaskTotal > 0 ? `
                                    <div class="subtask-progress-bar mt-1.5">
                                        <div class="subtask-progress-fill" style="width:${subtaskPct}%"></div>
                                    </div>` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-0.5 flex-shrink-0 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                ${subtaskTotal > 0 ? `<button onclick="openSubtaskModal(${task.id})" class="p-1.5 text-secondary hover:text-emerald-600"><i data-lucide="list-checks" class="w-4 h-4"></i></button>` : ''}
                                <button onclick="openModal(${task.id})" class="p-1.5 text-secondary hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteTask(${task.id})" class="p-1.5 text-secondary hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
            lucide.createIcons();
        }

        let priorityDragInfo = null;

        function startPriorityDrag(e, id) {
            // Ignore button clicks
            if (e.target.closest('button')) return;
            e.preventDefault();
            
            const card = e.currentTarget;
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const rect = card.getBoundingClientRect();
            
            priorityDragInfo = {
                id: id,
                element: card,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top,
                ghost: card.cloneNode(true)
            };

            priorityDragInfo.ghost.style.position = 'fixed';
            priorityDragInfo.ghost.style.width = rect.width + 'px';
            priorityDragInfo.ghost.style.height = rect.height + 'px';
            priorityDragInfo.ghost.style.top = rect.top + 'px';
            priorityDragInfo.ghost.style.left = rect.left + 'px';
            priorityDragInfo.ghost.style.opacity = '0.9';
            priorityDragInfo.ghost.style.pointerEvents = 'none';
            priorityDragInfo.ghost.style.zIndex = '1000';
            priorityDragInfo.ghost.style.transform = 'scale(1.02) rotate(2deg)';
            priorityDragInfo.ghost.classList.add('shadow-2xl', 'border-indigo-500');
            
            document.body.appendChild(priorityDragInfo.ghost);
            card.style.opacity = '0.3';

            document.addEventListener('pointermove', movePriorityDrag);
            document.addEventListener('pointerup', endPriorityDrag);
            document.addEventListener('pointercancel', endPriorityDrag);
        }

        function movePriorityDrag(e) {
            if (!priorityDragInfo) return;
            
            const ghost = priorityDragInfo.ghost;
            ghost.style.top = (e.clientY - priorityDragInfo.offsetY) + 'px';
            ghost.style.left = (e.clientX - priorityDragInfo.offsetX) + 'px';

            // Auto-scroll logic for mobile
            const mainEl = document.querySelector('main');
            const buffer = 100;
            if (e.clientY > window.innerHeight - buffer) {
                mainEl.scrollBy(0, 12);
            } else if (e.clientY < buffer + 60) {
                mainEl.scrollBy(0, -12);
            }

            // Highlight drop targets
            [1, 2, 3].forEach(p => {
                const list = document.getElementById(`list-p${p}`);
                const rect = list.getBoundingClientRect();
                if (e.clientX >= rect.left - 20 && e.clientX <= rect.right + 20 &&
                    e.clientY >= rect.top - 20 && e.clientY <= rect.bottom + 20) {
                    list.classList.add('bg-indigo-50', 'dark:bg-indigo-900/30', 'border-indigo-400');
                } else {
                    list.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'border-indigo-400');
                }
            });
        }

        function endPriorityDrag(e) {
            if (!priorityDragInfo) return;

            let newPriority = null;
            [1, 2, 3].forEach(p => {
                const list = document.getElementById(`list-p${p}`);
                const rect = list.getBoundingClientRect();
                if (e.clientX >= rect.left - 20 && e.clientX <= rect.right + 20 &&
                    e.clientY >= rect.top - 20 && e.clientY <= rect.bottom + 20) {
                    newPriority = p;
                }
                list.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/30', 'border-indigo-400');
            });

            if (newPriority) {
                const task = tasks.find(t => t.id === priorityDragInfo.id);
                if (task && task.priority !== newPriority) {
                    task.priority = newPriority;
                    saveTasks();
                }
            }

            priorityDragInfo.ghost.remove();
            priorityDragInfo.element.style.opacity = '1';
            priorityDragInfo = null;

            document.removeEventListener('pointermove', movePriorityDrag);
            document.removeEventListener('pointerup', endPriorityDrag);
            document.removeEventListener('pointercancel', endPriorityDrag);

            renderTasks();
        }

        function renderTimelineTasks() {
            const container = document.getElementById('timeline-tasks');
            const unscheduledArea = document.getElementById('unscheduled-area');
            if (!container || !unscheduledArea) return;
            
            container.innerHTML = '';
            unscheduledArea.innerHTML = '';

            const scheduled = tasks.filter(t => t.start !== null && t.end !== null).sort((a,b) => a.start - b.start);
            const unscheduled = tasks.filter(t => t.start === null || t.end === null);

            // Hide/Show Unscheduled logic
            if (unscheduled.length === 0) {
                unscheduledArea.style.display = 'none';
            } else {
                unscheduledArea.style.display = 'flex';
                unscheduled.forEach(task => {
                    const chip = document.createElement('div');
                    chip.className = 'unscheduled-chip';
                    chip.onpointerdown = (e) => startTimelineDragFromUnscheduled(e, task.id);
                    chip.innerHTML = `
                        <div class="w-1.5 h-1.5 rounded-full ${task.priority == 1 ? 'bg-rose-500' : task.priority == 2 ? 'bg-amber-500' : 'bg-emerald-500'}"></div>
                        <span class="font-bold" style="color: var(--task-text)">${task.title}</span>
                    `;
                    chip.onclick = (e) => { if (!e.defaultPrevented) openModal(task.id); };
                    unscheduledArea.appendChild(chip);
                });
            }

            scheduled.forEach((task, index) => {
                const color = task.priority == 1 ? 'bg-rose-500' : task.priority == 2 ? 'bg-amber-500' : 'bg-emerald-500';
                const left = (task.start - START_HOUR) * hourWidth;
                const width = (task.end - task.start) * hourWidth;
                
                const block = document.createElement('div');
                block.className = `task-block absolute h-12 md:h-14 rounded-xl ${color} p-2 shadow-lg flex flex-col justify-center group touch-none`;
                block.style.left = `${left}px`;
                block.style.width = `${width}px`;
                block.style.top = `0px`; // Aligned in one line
                
                block.innerHTML = `
                    <div class="relative w-full h-full pointer-events-none">
                        <div class="flex flex-col justify-center h-full pr-4">
                            <span class="text-[10px] md:text-xs font-black leading-tight whitespace-nowrap overflow-visible drop-shadow-sm !text-black dark:!text-white">
                                ${task.title}
                            </span>
                            ${width > 60 ? `<span class="text-[8px] font-bold mt-0.5 !text-black/80 dark:!text-white/80">${formatTime(task.start)} - ${formatTime(task.end)}</span>` : ''}
                        </div>
                        <div class="resize-handle pointer-events-auto" onpointerdown="startResize(event, ${task.id})"></div>
                    </div>
                `;

                block.onpointerdown = (e) => {
                    if (e.target.classList.contains('resize-handle')) return;
                    startDrag(e, task.id);
                };
                block.onclick = (e) => {
                    if (e.pointerType === 'touch' || width < 40) openModal(task.id);
                };
                container.appendChild(block);
            });
        }

        function startTimelineDragFromUnscheduled(e, taskId) {
            e.preventDefault(); // Stop native drag/scroll
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const el = e.currentTarget;
            el.setPointerCapture(e.pointerId);
            
            let isDragging = false;

            const ghost = el.cloneNode(true);
            ghost.style.position = 'fixed';
            ghost.style.pointerEvents = 'none';
            ghost.style.zIndex = '1000';
            ghost.style.opacity = '0.8';
            ghost.style.top = (e.clientY - 15) + 'px';
            ghost.style.left = (e.clientX - 30) + 'px';

            const onMove = (me) => {
                if (me.pointerId !== e.pointerId) return;
                if (!isDragging && (Math.abs(me.clientX - e.clientX) > 5 || Math.abs(me.clientY - e.clientY) > 5)) {
                    isDragging = true;
                    document.body.appendChild(ghost);
                }
                if (isDragging) {
                    ghost.style.top = (me.clientY - 15) + 'px';
                    ghost.style.left = (me.clientX - 30) + 'px';
                }
            };

            const cleanup = (ue) => {
                if (ue && ue.pointerId !== e.pointerId) return;
                if (isDragging) ghost.remove();
                try { el.releasePointerCapture(e.pointerId); } catch(err) {}
                el.removeEventListener('pointermove', onMove);
                el.removeEventListener('pointerup', onUp);
                el.removeEventListener('pointercancel', onCancel);
            };

            const onUp = (ue) => {
                if (ue.pointerId !== e.pointerId) return;
                if (isDragging) {
                    const grid = document.getElementById('timeline-grid');
                    const gridRect = grid.getBoundingClientRect();
                    
                    if (ue.clientX > gridRect.left && ue.clientX < gridRect.right && ue.clientY > gridRect.top && ue.clientY < gridRect.bottom) {
                        const x = ue.clientX - gridRect.left;
                        let start = x / hourWidth + START_HOUR;
                        task.start = Math.round(start * 4) / 4; 
                        if (task.start < START_HOUR) task.start = START_HOUR;
                        if (task.start > END_HOUR - 0.5) task.start = END_HOUR - 0.5;
                        task.end = task.start + 1;
                        renderTasks();
                    }
                } else {
                    openModal(task.id);
                }
                cleanup(ue);
            };

            const onCancel = (ce) => {
                cleanup(ce);
            };

            el.addEventListener('pointermove', onMove);
            el.addEventListener('pointerup', onUp);
            el.addEventListener('pointercancel', onCancel);
        }

        function openModal(taskId = null) {
            const modal = document.getElementById('task-modal');
            const form = document.getElementById('task-form');
            const idInput = document.getElementById('task-id');
            const titleInput = document.getElementById('task-title');
            const priorityInput = document.getElementById('task-priority');
            const startInput = document.getElementById('task-start');
            const endInput = document.getElementById('task-end');

            // Reset day buttons
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('recurrence-days-picker').classList.add('hidden');

            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                document.getElementById('modal-title').innerText = 'Edit Task';
                document.getElementById('modal-submit').innerText = 'Save';
                idInput.value = task.id;
                titleInput.value = task.title;
                priorityInput.value = task.priority;
                startInput.value = decimalToTimeString(task.start);
                endInput.value = decimalToTimeString(task.end);

                // Recurrence
                const recur = task.recurrence || 'none';
                document.getElementById('task-recurrence').value = recur;
                if (recur === 'custom') {
                    document.getElementById('recurrence-days-picker').classList.remove('hidden');
                    (task.recurrenceDays || []).forEach(d => {
                        const btn = document.querySelector(`.day-btn[data-day="${d}"]`);
                        if (btn) btn.classList.add('active');
                    });
                }

                // Subtasks
                modalSubtasks = JSON.parse(JSON.stringify(task.subtasks || []));
            } else {
                document.getElementById('modal-title').innerText = 'New Task';
                document.getElementById('modal-submit').innerText = 'Create';
                idInput.value = '';
                form.reset();
                document.getElementById('task-recurrence').value = 'none';
                modalSubtasks = [];
            }
            renderModalSubtasks();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('task-modal').classList.add('hidden');
            document.getElementById('task-modal').classList.remove('flex');
        }

        // --- Recurrence helpers ---
        function toggleRecurrenceDays() {
            const val = document.getElementById('task-recurrence').value;
            const picker = document.getElementById('recurrence-days-picker');
            if (val === 'custom') {
                picker.classList.remove('hidden');
            } else {
                picker.classList.add('hidden');
            }
        }

        function toggleDay(btn) {
            btn.classList.toggle('active');
        }

        function getRecurrenceLabel(task) {
            if (!task.recurrence || task.recurrence === 'none') return null;
            const labels = { daily: 'Daily', weekdays: 'Weekdays', weekly: 'Weekly', custom: 'Custom' };
            return labels[task.recurrence] || null;
        }

        // --- Subtask helpers (modal) ---
        function renderModalSubtasks() {
            const list = document.getElementById('subtask-list');
            if (!list) return;
            list.innerHTML = '';
            modalSubtasks.forEach((st, i) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 bg-secondary/50 rounded-xl px-3 py-2 border border-base';
                row.innerHTML = `
                    <input type="checkbox" ${st.done ? 'checked' : ''} onchange="modalSubtasks[${i}].done=this.checked;renderModalSubtasks();" class="w-4 h-4 accent-indigo-600 cursor-pointer flex-shrink-0">
                    <span class="flex-1 text-sm text-primary ${st.done ? 'line-through opacity-40' : ''}">${st.text}</span>
                    <button type="button" onclick="removeModalSubtask(${i})" class="text-secondary hover:text-rose-500 transition-colors flex-shrink-0">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                list.appendChild(row);
            });
            lucide.createIcons();
        }

        function addSubtask() {
            const input = document.getElementById('new-subtask-input');
            const text = input.value.trim();
            if (!text) return;
            modalSubtasks.push({ id: Date.now(), text, done: false });
            input.value = '';
            renderModalSubtasks();
        }

        function removeModalSubtask(index) {
            modalSubtasks.splice(index, 1);
            renderModalSubtasks();
        }

        function handleTaskSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('task-id').value;
            const title = document.getElementById('task-title').value;
            const priority = parseInt(document.getElementById('task-priority').value);
            const startVal = document.getElementById('task-start').value;
            const endVal = document.getElementById('task-end').value;
            const recurrence = document.getElementById('task-recurrence').value;
            const recurrenceDays = recurrence === 'custom'
                ? [...document.querySelectorAll('.day-btn.active')].map(b => parseInt(b.dataset.day))
                : [];

            const start = startVal ? timeStringToDecimal(startVal) : null;
            const end = endVal ? timeStringToDecimal(endVal) : null;

            if (start !== null && end !== null && end <= start) {
                alert("End must be after start"); return;
            }

            if (id) {
                const idx = tasks.findIndex(t => t.id == id);
                tasks[idx] = { ...tasks[idx], title, priority, start, end, recurrence, recurrenceDays, subtasks: modalSubtasks };
            } else {
                tasks.push({ id: Date.now(), title, priority, start, end, recurrence, recurrenceDays, subtasks: modalSubtasks });
            }
            renderTasks();
            closeModal();
        }

        // --- Subtask detail modal (from card) ---
        function openSubtaskModal(taskId) {
            activeSubtaskTaskId = taskId;
            const task = tasks.find(t => t.id === taskId);
            document.getElementById('subtask-modal-title').innerText = task.title;
            renderSubtaskDetailList();
            document.getElementById('subtask-modal').classList.remove('hidden');
            document.getElementById('subtask-modal').classList.add('flex');
            lucide.createIcons();
        }

        function closeSubtaskModal() {
            document.getElementById('subtask-modal').classList.add('hidden');
            document.getElementById('subtask-modal').classList.remove('flex');
            activeSubtaskTaskId = null;
            renderTasks();
        }

        function renderSubtaskDetailList() {
            const task = tasks.find(t => t.id === activeSubtaskTaskId);
            if (!task) return;
            const done = task.subtasks.filter(s => s.done).length;
            document.getElementById('subtask-modal-progress').innerText = `${done} of ${task.subtasks.length} steps done`;
            const list = document.getElementById('subtask-detail-list');
            list.innerHTML = '';
            task.subtasks.forEach((st, i) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-3 bg-secondary/50 rounded-xl px-4 py-3 border border-base transition-all';
                row.innerHTML = `
                    <button type="button" onclick="toggleSubtaskDone(${i})" class="flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${st.done ? 'bg-indigo-600 border-indigo-600' : 'border-base hover:border-indigo-400'}">
                        ${st.done ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                    </button>
                    <span class="flex-1 text-sm font-medium text-primary ${st.done ? 'line-through opacity-40' : ''}">${st.text}</span>
                    <button type="button" onclick="deleteSubtask(${i})" class="text-secondary hover:text-rose-500 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(row);
            });
            lucide.createIcons();
        }

        function toggleSubtaskDone(index) {
            const task = tasks.find(t => t.id === activeSubtaskTaskId);
            task.subtasks[index].done = !task.subtasks[index].done;
            saveTasks();
            renderSubtaskDetailList();
        }

        function deleteSubtask(index) {
            const task = tasks.find(t => t.id === activeSubtaskTaskId);
            task.subtasks.splice(index, 1);
            saveTasks();
            renderSubtaskDetailList();
        }

        function addSubtaskInline() {
            const input = document.getElementById('subtask-inline-input');
            const text = input.value.trim();
            if (!text) return;
            const task = tasks.find(t => t.id === activeSubtaskTaskId);
            task.subtasks.push({ id: Date.now(), text, done: false });
            input.value = '';
            saveTasks();
            renderSubtaskDetailList();
        }

        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); renderTasks(); }
        function saveTasks() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
        function updateCounts() { [1,2,3].forEach(p => { 
            const count = tasks.filter(t => t.priority === p).length;
            const el = document.getElementById(`count-p${p}`);
            if (el) el.innerText = count;
        }); }

        let activeAction = null;
        function startDrag(e, id) {
            e.preventDefault();
            const task = tasks.find(t => t.id === id);
            const el = e.currentTarget;
            el.setPointerCapture(e.pointerId);
            activeAction = { type: 'drag', id, startX: e.clientX, initStart: task.start, initEnd: task.end, pointerId: e.pointerId, element: el };
            document.addEventListener('pointermove', handleMove);
            document.addEventListener('pointerup', endMove);
            document.addEventListener('pointercancel', endMove);
        }

        function startResize(e, id) {
            e.preventDefault(); 
            e.stopPropagation();
            const task = tasks.find(t => t.id === id);
            const el = e.currentTarget;
            el.setPointerCapture(e.pointerId);
            activeAction = { type: 'resize', id, startX: e.clientX, initEnd: task.end, pointerId: e.pointerId, element: el };
            document.addEventListener('pointermove', handleMove);
            document.addEventListener('pointerup', endMove);
            document.addEventListener('pointercancel', endMove);
        }

        function handleMove(e) {
            if (!activeAction || e.pointerId !== activeAction.pointerId) return;
            const delta = (e.clientX - activeAction.startX) / hourWidth;
            const snappedDelta = Math.round(delta * 4) / 4;
            const task = tasks.find(t => t.id === activeAction.id);

            if (activeAction.type === 'drag') {
                const dur = activeAction.initEnd - activeAction.initStart;
                let s = activeAction.initStart + snappedDelta;
                if (s < START_HOUR) s = START_HOUR;
                if (s + dur > END_HOUR) s = END_HOUR - dur;
                task.start = s; task.end = s + dur;
            } else {
                let end = activeAction.initEnd + snappedDelta;
                if (end < task.start + 0.25) end = task.start + 0.25;
                if (end > END_HOUR) end = END_HOUR;
                task.end = end;
            }
            renderTimelineTasks();
        }

        function endMove(e) {
            if (activeAction && activeAction.element && e.pointerId === activeAction.pointerId) {
                try { activeAction.element.releasePointerCapture(e.pointerId); } catch(err) {}
            }
            activeAction = null;
            document.removeEventListener('pointermove', handleMove);
            document.removeEventListener('pointerup', endMove);
            document.removeEventListener('pointercancel', endMove);
            saveTasks();
            renderPriorityLists();
        }

        function formatTime(decimal) {
            if (decimal === null) return '';
            const h = Math.floor(decimal);
            const m = Math.round((decimal - h) * 60);
            const period = h >= 12 ? 'PM' : 'AM';
            const displayH = h % 12 || 12;
            return `${displayH}:${m.toString().padStart(2, '0')} ${period}`;
        }

        function timeStringToDecimal(str) {
            const [h, m] = str.split(':').map(Number);
            return h + m / 60;
        }

        function decimalToTimeString(decimal) {
            if (decimal === null) return "";
            const h = Math.floor(decimal);
            const m = Math.round((decimal - h) * 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        // Habit functions
        let historyMonth = new Date().getMonth();
        let historyYear = new Date().getFullYear();
        let activeHistoryHabitId = null;

        function getStreak(habit) {
            let streak = 0;
            const d = new Date();
            while (true) {
                const key = d.toISOString().split('T')[0];
                const logs = habit.logs[key] || [];
                if (logs.length >= habit.goal) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else {
                    break;
                }
            }
            return streak;
        }

        function getLast7Days() {
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                days.push({
                    key: d.toISOString().split('T')[0],
                    label: ['S','M','T','W','T','F','S'][d.getDay()],
                    isToday: i === 0
                });
            }
            return days;
        }

        function renderHabits() {
            const list = document.getElementById('habits-list');
            const emptyState = document.getElementById('habits-empty-state');
            const today = new Date().toISOString().split('T')[0];

            list.innerHTML = '';

            if (habits.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                document.getElementById('habits-summary').innerText = '';
                return;
            }
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            const doneCount = habits.filter(h => (h.logs[today] || []).length >= h.goal).length;
            document.getElementById('habits-summary').innerText =
                doneCount === habits.length
                    ? '🎉 All habits done today!'
                    : `${doneCount} of ${habits.length} done today`;

            const last7 = getLast7Days();
            const R = 28; // ring radius
            const C = 2 * Math.PI * R; // circumference

            habits.forEach(habit => {
                const logs = habit.logs[today] || [];
                const count = logs.length;
                const isDone = count >= habit.goal;
                const progress = Math.min(count / habit.goal, 1);
                const streak = getStreak(habit);
                const dashOffset = C - progress * C;

                const card = document.createElement('div');
                card.className = 'habit-card';

                card.innerHTML = `
                    <div class="p-4 flex items-center gap-4">

                        <!-- Big tap button with ring -->
                        <button onclick="logHabit(${habit.id})" class="habit-log-btn ${isDone ? 'done' : ''} relative flex-shrink-0"
                            style="background-color: ${isDone ? habit.color : 'var(--bg-secondary)'}; ${!isDone ? 'box-shadow:none;border:2px dashed var(--border-color);' : ''}">
                            <!-- SVG ring overlay -->
                            <svg width="60" height="60" style="position:absolute;top:0;left:0;pointer-events:none;">
                                <circle class="habit-ring-bg" cx="30" cy="30" r="${R}"/>
                                <circle class="habit-ring-fill"
                                    cx="30" cy="30" r="${R}"
                                    stroke="${habit.color}"
                                    stroke-dasharray="${C}"
                                    stroke-dashoffset="${isDone ? 0 : dashOffset}"
                                    style="transform-origin:30px 30px;"/>
                            </svg>
                            ${isDone
                                ? `<span style="font-size:1.5rem;position:relative;z-index:1;">✓</span>`
                                : `<span style="font-size:0.7rem;font-weight:900;color:${habit.color};position:relative;z-index:1;line-height:1;">${count}<br><span style="font-size:0.55rem;opacity:0.7">/${habit.goal}</span></span>`
                            }
                        </button>

                        <!-- Info -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between gap-2">
                                <h4 class="font-extrabold text-primary text-base truncate">${habit.title}</h4>
                                <div class="flex items-center gap-1 flex-shrink-0">
                                    <button onclick="showHabitHistory(${habit.id})" class="p-1.5 text-secondary hover:text-indigo-500 transition-colors rounded-lg bg-secondary/60"><i data-lucide="calendar" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="openHabitModal(${habit.id})" class="p-1.5 text-secondary hover:text-amber-500 transition-colors rounded-lg bg-secondary/60"><i data-lucide="settings" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="deleteHabit(${habit.id})" class="p-1.5 text-secondary hover:text-rose-500 transition-colors rounded-lg bg-secondary/60"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>

                            <!-- Streak + goal -->
                            <div class="flex items-center gap-3 mt-0.5">
                                ${streak > 0 ? `<span class="text-[11px] font-black" style="color:${habit.color}">🔥 ${streak} day streak</span>` : ''}
                                <span class="text-[11px] font-bold text-secondary">${isDone ? '✓ Goal met!' : `${count}/${habit.goal} today`}</span>
                            </div>

                            <!-- Last 7 days dots -->
                            <div class="flex items-center gap-1 mt-2.5">
                                ${last7.map(d => {
                                    const dc = (habit.logs[d.key] || []).length;
                                    const met = dc >= habit.goal;
                                    const partial = dc > 0 && !met;
                                    let bg, textCol;
                                    if (met)          { bg = habit.color;       textCol = '#fff'; }
                                    else if (partial) { bg = habit.color + '55'; textCol = habit.color; }
                                    else              { bg = 'var(--bg-secondary)'; textCol = 'var(--text-secondary)'; }
                                    return `<div class="week-dot ${d.isToday ? 'today-dot' : ''}" style="background:${bg};color:${textCol};">${d.label}</div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Thin bottom progress bar -->
                    <div style="height:3px;background:var(--border-color);">
                        <div style="height:100%;width:${Math.round(progress*100)}%;background:${habit.color};transition:width 0.5s ease;border-radius:0 0 20px 20px;"></div>
                    </div>
                `;
                list.appendChild(card);
            });

            lucide.createIcons();
            saveHabits();
        }

        function logHabit(id) {
            const today = new Date().toISOString().split('T')[0];
            const habit = habits.find(h => h.id === id);
            if (!habit.logs[today]) habit.logs[today] = [];
            habit.logs[today].push(new Date().getTime());
            renderHabits();
        }

        function showHabitHistory(id) {
            activeHistoryHabitId = id;
            const habit = habits.find(h => h.id === id);
            const modal = document.getElementById('habit-history-modal');
            const icon = document.getElementById('history-habit-icon');
            const title = document.getElementById('history-habit-title');
            
            icon.style.backgroundColor = habit.color;
            icon.innerText = habit.title.charAt(0).toUpperCase();
            title.innerText = `${habit.title} History`;
            
            document.getElementById('partial-dot').style.backgroundColor = habit.color;
            document.getElementById('complete-dot').style.backgroundColor = habit.color;

            renderCalendar();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeHabitHistory() {
            document.getElementById('habit-history-modal').classList.add('hidden');
            document.getElementById('habit-history-modal').classList.remove('flex');
        }

        function changeHistoryMonth(delta) {
            historyMonth += delta;
            if (historyMonth > 11) { historyMonth = 0; historyYear++; }
            if (historyMonth < 0) { historyMonth = 11; historyYear--; }
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('current-month-display');
            const habit = habits.find(h => h.id === activeHistoryHabitId);
            
            grid.innerHTML = '';
            const firstDay = new Date(historyYear, historyMonth, 1).getDay();
            const daysInMonth = new Date(historyYear, historyMonth + 1, 0).getDate();
            const monthName = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(new Date(historyYear, historyMonth));
            
            monthDisplay.innerText = `${monthName} ${historyYear}`;

            // Padding for first day of week
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${historyYear}-${(historyMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const logs = habit.logs[dateStr] || [];
                const count = logs.length;
                const isGoalMet = count >= habit.goal;
                const hasActivity = count > 0;
                
                const dayEl = document.createElement('div');
                dayEl.className = `h-10 w-full rounded-lg flex items-center justify-center text-xs font-bold relative transition-all`;
                
                if (isGoalMet) {
                    dayEl.style.backgroundColor = habit.color;
                    dayEl.classList.add('text-white', 'shadow-sm');
                } else if (hasActivity) {
                    dayEl.style.backgroundColor = habit.color;
                    dayEl.classList.add('opacity-40', 'text-white');
                } else {
                    dayEl.classList.add('bg-secondary', 'text-secondary', 'opacity-30');
                }

                dayEl.innerText = day;
                grid.appendChild(dayEl);
            }
        }

        function openHabitModal(id = null) {
            const modal = document.getElementById('habit-modal');
            const form = document.getElementById('habit-form');
            const idInput = document.getElementById('habit-id');
            const titleInput = document.getElementById('habit-title');
            const goalInput = document.getElementById('habit-goal');
            const colorInput = document.getElementById('habit-color');
            
            if (id) {
                const habit = habits.find(h => h.id === id);
                document.getElementById('habit-modal-title').innerText = 'Edit Habit';
                document.getElementById('habit-modal-submit').innerText = 'Save Changes';
                idInput.value = habit.id;
                titleInput.value = habit.title;
                goalInput.value = habit.goal;
                colorInput.value = habit.color;
            } else {
                document.getElementById('habit-modal-title').innerText = 'New Habit';
                document.getElementById('habit-modal-submit').innerText = 'Add Habit';
                idInput.value = '';
                form.reset();
                colorInput.value = '#4f46e5';
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeHabitModal() {
            document.getElementById('habit-modal').classList.add('hidden');
            document.getElementById('habit-modal').classList.remove('flex');
        }

        function handleHabitSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('habit-id').value;
            const title = document.getElementById('habit-title').value;
            const goal = parseInt(document.getElementById('habit-goal').value);
            const color = document.getElementById('habit-color').value;

            if (id) {
                const idx = habits.findIndex(h => h.id == id);
                habits[idx] = { ...habits[idx], title, goal, color };
            } else {
                habits.push({ id: Date.now(), title, goal, color, logs: {} });
            }
            saveHabits();
            renderHabits();
            closeHabitModal();
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            saveHabits();
            renderHabits();
        }

        function saveHabits() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        async function exportData() {
            const data = {
                tasks: tasks,
                habits: habits,
                theme: isDarkMode ? 'dark' : 'light',
                exportDate: new Date().toISOString()
            };
            const jsonString = JSON.stringify(data, null, 2);
            const fileName = `taskflow-export-${new Date().toISOString().split('T')[0]}.json`;

            // Running inside Capacitor APK?
            const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());

            if (isNative) {
                // Re-check bridge in case it loaded after page init
                if (!window.CapFS && window.Capacitor && window.Capacitor.Plugins) {
                    window.CapFS = window.Capacitor.Plugins.Filesystem;
                }
                if (!window.CapFS) {
                    alert('Export not available — Filesystem plugin not loaded.');
                    return;
                }
                try {
                    // Android 10+ (API 29+): use app-specific external files dir (no permission needed)
                    await window.CapFS.writeFile({
                        path: fileName,
                        data: jsonString,
                        directory: 'DOCUMENTS',
                        encoding: 'utf8'
                    });
                    alert('✅ Exported!\n\nSaved to Documents folder:\n' + fileName);
                } catch (e1) {
                    try {
                        // Fallback: internal app data directory (always writable)
                        await window.CapFS.writeFile({
                            path: fileName,
                            data: jsonString,
                            directory: 'DATA',
                            encoding: 'utf8'
                        });
                        alert('✅ Exported!\n\nSaved to app data folder:\n' + fileName);
                    } catch (e2) {
                        alert('❌ Export failed: ' + e2.message);
                    }
                }
            } else {
                // Browser: use classic download method
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }

        window.onload = init;
    </script>
